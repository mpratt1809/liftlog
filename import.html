    .stat { font-size: 24px; font-weight: 700; color: #e8ff47; }
    .stat-label { font-size: 12px; color: #6b7592; margin-top: 2px; }

    function sanitize(val) {
      // Recursively remove any undefined values — replace with null
      if (Array.isArray(val)) return val.map(sanitize);
      if (val && typeof val === 'object') {
        const out = {};
        for (const [k,v] of Object.entries(val)) {
          if (v !== undefined) out[k] = sanitize(v);
        }
        return out;
      }
      return val === undefined ? null : val;
    }

    function guessDay(focus) {
      const f = (focus||'').toLowerCase();
      if (f.includes('legs') || f.includes('🦵')) return 'sun';
      if (f.includes('chest') && f.includes('tri')) return 'mon';
      if (f.includes('back') && f.includes('bi')) return 'tue';
      if (f.includes('shoulders') || f.includes('🔝')) return 'thu';
      return 'custom';
    }

    function calcVolume(exercises) {
      let vol = 0;
      (exercises||[]).forEach(e => {
        (e.setData||[]).forEach(s => {
          const w = parseFloat(s.weight)||0;
          const r = parseInt(s.reps)||0;
          if (w > 0 && r > 0) vol += w * r;
        });
      });
      return vol;
    }

    function buildDoc(s) {
      const exercises = (s.exercises||[]).filter(e => e && typeof e === 'object' && e.name);
      const cardio    = (s.cardio||[]).filter(c => c && typeof c === 'object' && c.activity);
      // Replace empty strings with null for Firestore safety
      const safeCardio = cardio.map(c => ({
        ...c,
        duration: c.duration === '' ? null : c.duration,
        distance: c.distance === '' ? null : c.distance,
      }));
      return sanitize({
        user:      'sky',
        date:      s.date || '',
        day:       guessDay(s.focus),
        focus:     s.focus || 'Home Workout',
        exercises,
        cardio: safeCardio,
        notes:     typeof s.notes === 'string' ? s.notes : '',
        period:    s.period === true ? true : false,
        volume:    calcVolume(exercises),
        timestamp: Timestamp.fromDate(new Date((s.date||'2023-01-01') + 'T12:00:00')),
      });
    }

    function log(msg, cls='') {
      const el = document.getElementById('log');
      const line = document.createElement('div');
      line.className = cls;
      line.textContent = msg;
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;
    }

    let done = 0, errs = 0;

    window.startImport = async function() {
      document.getElementById('start-btn').disabled = true;
      document.getElementById('start-btn').textContent = 'Importing…';
      log('Starting import of ' + SESSIONS.length + ' sessions…', 'info');

      for (let i = 0; i < SESSIONS.length; i++) {
        const s = SESSIONS[i];
        try {
          await addDoc(collection(db, 'workouts'), buildDoc(s));
          done++;
          document.getElementById('stat-done').textContent = done;
          document.getElementById('prog').style.width = Math.round((done+errs)/SESSIONS.length*100) + '%';
          if (i % 25 === 0) log('✓ ' + done + ' imported (' + s.date + ')', 'ok');
        } catch(err) {
          errs++;
          document.getElementById('stat-err').textContent = errs;
          log('✗ ' + s.date + ': ' + err.message, 'err');
        }
        if (i % 50 === 49) await new Promise(r => setTimeout(r, 400));
      }

      log('Done! ' + done + ' imported, ' + errs + ' errors.', done > 0 ? 'ok' : 'err');
      document.getElementById('start-btn').textContent = '✅ Done';
      if (errs === 0) document.getElementById('done-msg').style.display = 'block';
    };
  </script>
